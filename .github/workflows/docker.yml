name: Docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t ib-gateway:test .

      - name: Smoke test
        run: |
          # Start container in background with demo credentials
          docker run -d \
            --name ib-gateway-smoke \
            -e TWSUSERID=edemo \
            -e TWSPASSWORD=demouser \
            -e TRADING_MODE=paper \
            -p 4002:4002 \
            -p 5900:5900 \
            ib-gateway:test

          # Wait for startup
          sleep 45

          # Verify container is still running
          docker ps | grep ib-gateway-smoke

          # Verify key processes exist
          docker exec ib-gateway-smoke pgrep -f Xvfb
          docker exec ib-gateway-smoke pgrep -f x11vnc
          docker exec ib-gateway-smoke pgrep -f socat
          docker exec ib-gateway-smoke pgrep -f java

          # Cleanup
          docker stop ib-gateway-smoke
          docker rm ib-gateway-smoke

  push:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ib-gateway-docker:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/ib-gateway-docker:latest
